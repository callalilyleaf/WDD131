<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Cool Pics - A responsive image gallery">
    <meta name="author" content="Student Name">
    <title>Cool Pics</title>
    <link rel="stylesheet" href="coolpics.css">
</head>
<body>
    <!-- Navigation -->
    <header>
        <nav>
            <div class="nav-brand">
                <h1>Cool Pics</h1>
            </div>
            <!-- Hamburger button for mobile -->
            <button id="menu-btn" class="menu-btn" aria-label="Toggle navigation menu" aria-expanded="false">
                &#9776;
            </button>
            <ul id="nav-menu" class="nav-menu">
                <li><a href="#">Home</a></li>
                <li><a href="#">Gallery</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
    </header>

    <!-- Gallery -->
    <main>
        <h2>Gallery</h2>
        <div class="gallery">
            <figure>
                <img
                    class="gallery-img"
                    src="../gallery/images/images/book-sm.jpg"
                    alt="person reading a book"
                    data-full="../gallery/images/images/book-full.jpg"
                >
                <figcaption>Reading</figcaption>
            </figure>
            <figure>
                <img
                    class="gallery-img"
                    src="../gallery/images/images/couch-sm.jpg"
                    alt="person sitting on a couch with a phone"
                    data-full="../gallery/images/images/couch-full.jpg"
                >
                <figcaption>On the Couch</figcaption>
            </figure>
            <figure>
                <img
                    class="gallery-img"
                    src="../gallery/images/images/desk-sm.jpg"
                    alt="a work desktop"
                    data-full="../gallery/images/images/desk-full.jpg"
                >
                <figcaption>At the Desk</figcaption>
            </figure>
            <figure>
                <img
                    class="gallery-img"
                    src="../gallery/images/images/keyboard-sm.jpg"
                    alt="person typing on a keyboard"
                    data-full="../gallery/images/images/keyboard-full.jpg"
                >
                <figcaption>Keyboard</figcaption>
            </figure>
            <figure>
                <img
                    class="gallery-img"
                    src="../gallery/images/images/phone-sm.jpg"
                    alt="person looking at a phone"
                    data-full="../gallery/images/images/phone-full.jpg"
                >
                <figcaption>On the Phone</figcaption>
            </figure>
            <figure>
                <img
                    class="gallery-img"
                    src="../gallery/images/images/sit-sm.jpg"
                    alt="person sitting on a couch"
                    data-full="../gallery/images/images/sit-full.jpg"
                >
                <figcaption>Sitting</figcaption>
            </figure>
        </div>
    </main>

    <!-- Modal -->
    <div id="modal" class="modal" role="dialog" aria-modal="true" aria-label="Image viewer">
        <div class="modal-content">
            <button id="modal-close" class="modal-close" aria-label="Close image viewer">&times;</button>
            <img id="modal-img" src="" alt="">
        </div>
    </div>

    <script src="coolpics.js"></script>
</body>
</html>
