<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ivan Cheng | Projects</title>
    <link rel="icon" href="source/favicon.png" type="image/png" />
    <link rel="stylesheet" href="styles/projects.css" />
  </head>

  <body>
    <header>
      <nav>
        <a href="index.html">Home</a>
        <a href="projects.html" class="active">All Projects</a>
      </nav>
    </header>

    <main>
      <!-- ── Hero ── -->
      <section class="project-hero">
        <div class="hero-text">
          <h1>Projects <br>&#8212; Where it all begins &#8212;</h1>
        </div>
        <img
          src="source/macintosh.jpg"
          alt="Macintosh computer"
          class="hero-photo"
        />
      </section>
      
      <hr />

      <!-- ── Search (below hero, centered) ── -->
      <div class="search-below">
        <input
          type="text"
          id="heroSearch"
          placeholder="Search my projects!"
          autocomplete="off"
        />
      </div>

      <!-- ── Mode Switch (right-aligned) ── -->
      <div class="mode-switch-container">
        <span class="switch-label" id="timelineLabel">Timeline</span>
        <button
          class="switch-track"
          id="modeSwitch"
          aria-pressed="false"
          title="Toggle between Search and Timeline mode"
        >
          <span class="switch-thumb"></span>
        </button>
        <span class="switch-label active" id="searchLabel">Search</span>
      </div>

      <!-- ══════════════ SEARCH MODE (default) ══════════════ -->
      <section id="searchMode" class="mode-section active">
        <div class="filter-bar">
          <div class="tag-list">
            <button class="tag-btn" data-tag="Python">#Python</button>
            <button class="tag-btn" data-tag="ReactFlow">#ReactFlow</button>
            <button class="tag-btn" data-tag="JavaScript">#JavaScript</button>
            <button class="tag-btn" data-tag="MachineLearning">#MachineLearning</button>
            <button class="tag-btn" data-tag="C#">#C#</button>
            <button class="tag-btn" data-tag="Java">#Java</button>
            <button class="tag-btn" data-tag="Backend">#Backend</button>
            <button class="tag-btn" data-tag="DataScience">#DataScience</button>
            <button class="tag-btn" data-tag="AIAgent">#AIAgent</button>
          </div>
          <button class="clear-btn" id="clearFilters">Clear</button>
        </div>

        <div class="projects-grid" id="projectsGrid">
          <!-- Cards injected by projects.js -->
        </div>

        <p class="no-results" id="noResults" hidden>
          No projects match the current filters.
        </p>
      </section>

      <!-- ══════════════ TIMELINE MODE ══════════════ -->
      <section id="timelineMode" class="mode-section">
        <div class="recent-banner">
          <div class="recent-left">The projects I'm working on recently:</div>
          <div class="recent-right">
            Github API — repos with commits within the last month
          </div>
        </div>

        <hr />

        <p class="timeline-direction">Time: Recent &#8594; Beginning</p>

        <div class="timeline" id="projectTimeline">
          <!-- Items injected by projects.js -->
        </div>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 Ivan Cheng</p>
      <div class="social-icons">
        <a href="https://github.com/callalilyleaf" aria-label="GitHub" target="_blank" rel="noopener">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="currentColor">

          </svg>
        </a>
        <a href="https://www.linkedin.com/in/cheng-ivan/" aria-label="LinkedIn" target="_blank" rel="noopener">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="currentColor">

      </div>
    </footer>

    <script src="scripts/projects.js"></script>
  </body>
</html>
