<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Computational Thinking - Theme Switcher">
    <meta name="author" content="Student Name">
    <title>Theme Switcher</title>
    <link rel="stylesheet" href="dom-theme.css">
</head>
<body>
    <div class="container">
        <!-- Theme select dropdown -->
        <select id="theme-select">
            <option value="default">Choose a Theme</option>
            <option value="ocean">Ocean</option>
            <option value="forest">Forest</option>
            <option value="desert">Desert</option>
        </select>

        <!-- Logo -->
        <img
            id="logo"
            src="wdd131.png"
            alt="WDD 131 Logo"
        >

        <!-- Content area whose font changes with theme -->
        <div class="content">
            <h1>WDD 131</h1>
            <p>Dynamic Web Fundamentals</p>
            <p>Select a theme above to change the background and typography.</p>
        </div>
    </div>

    <script src="dom-theme.js"></script>
</body>
</html>
